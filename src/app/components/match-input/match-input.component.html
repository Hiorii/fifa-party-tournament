<article class="match">
  <div class="match__console">{{ consoleName() }}</div>

  <div class="match__teams">
    <strong>{{ homeLabel() }}</strong>
    <span>vs</span>
    <strong>{{ awayLabel() }}</strong>
  </div>

  <div class="match__score">
    <label>
      Home
      <input
        type="number"
        min="0"
        inputmode="numeric"
        aria-label="Home goals"
        [ngModel]="homeGoals()"
        (ngModelChange)="setHomeGoals($event)"
        placeholder="0"
        onclick="this.select()"
      />
    </label>
    <span>:</span>
    <label>
      Away
      <input
        type="number"
        min="0"
        inputmode="numeric"
        aria-label="Away goals"
        [ngModel]="awayGoals()"
        (ngModelChange)="setAwayGoals($event)"
        placeholder="0"
        onclick="this.select()"
      />
    </label>
    <button type="button" class="btn btn--ghost btn--sm" (click)="clear()">Clear</button>
  </div>
</article>
